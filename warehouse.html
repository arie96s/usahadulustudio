<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>WAREHOUSE PRO V2 | MAGOS SYSTEM</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="magos/css/magos.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    :root { 
        --magos-green: #25D366; 
        --border: #222; 
        --danger: #ff4444;
        --terminal-bg: #050505;
    }
    body { background: #000; color: #fff; padding: 40px 20px; font-family: 'Inter', sans-serif; cursor: none; }
    .container { max-width: 1200px; margin: 0 auto; filter: blur(10px); pointer-events: none; transition: 0.5s; }
    
    /* Security Overlay */
    #securityOverlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.95); z-index: 9999;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .pin-box {
        background: #0b0b0b; border: 1px solid #222; padding: 40px; border-radius: 20px;
        text-align: center; width: 320px;
    }
    .pin-input {
        background: #000; border: 1px solid #333; color: var(--magos-green);
        width: 100%; text-align: center; font-size: 24px; padding: 15px;
        border-radius: 10px; margin: 20px 0; font-family: monospace; letter-spacing: 10px;
    }
    .status-text { font-size: 10px; font-weight: 900; letter-spacing: 2px; color: #444; margin-bottom: 20px; }

    /* Layout Warehouse Header Fix */
    .header { 
        display: flex; 
        justify-content: space-between; 
        align-items: flex-end; 
        margin-bottom: 40px; 
        border-bottom: 1px solid var(--border); 
        padding-bottom: 20px; 
    }
    .logo-area { display: flex; align-items: center; gap: 20px; }
    .logo-main { height: 60px; filter: none; }
    .system-status { display: flex; align-items: center; gap: 8px; font-size: 10px; color: var(--magos-green); font-weight: 900; }
    .pulse-dot { width: 8px; height: 8px; background: var(--magos-green); border-radius: 50%; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

    /* Dashboard Stats */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px; }
    .stat-card { background: #0b0b0b; border: 1px solid var(--border); padding: 20px; border-radius: 12px; }
    .stat-card p { font-size: 9px; color: #666; text-transform: uppercase; margin-bottom: 5px; font-weight: 700; }
    .stat-card h2 { font-size: 22px; font-weight: 900; }

    /* Main Table */
    .table-container { background: #0b0b0b; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 30px; }
    table { width: 100%; border-collapse: collapse; }
    th { background: #111; text-align: left; padding: 15px; font-size: 10px; text-transform: uppercase; color: #444; }
    td { padding: 15px; font-size: 13px; border-bottom: 1px solid var(--border); }

    .stock-pill { display: inline-flex; flex-direction: column; align-items: center; background: #000; border: 1px solid #222; padding: 5px 10px; border-radius: 6px; margin-right: 5px; }
    .stock-pill .sz { font-size: 9px; color: #555; font-weight: 900; }
    .stock-pill .qt.low { color: var(--danger); font-weight: 900; }

    /* Terminal Log System */
    .log-container { 
        background: var(--terminal-bg); 
        border: 1px solid var(--border); 
        border-radius: 12px; 
        padding: 20px; 
        max-height: 300px; 
        overflow-y: auto; 
        font-family: 'Courier New', Courier, monospace;
        position: relative;
    }
    .log-container::before {
        content: "TERMINAL_OUTPUT";
        position: absolute; top: 5px; right: 15px;
        font-size: 8px; color: #222; font-weight: 900;
    }
    .log-item { 
        display: flex; 
        gap: 15px;
        font-size: 11px; 
        padding: 5px 0; 
        border-bottom: 1px solid #0a0a0a; 
    }
    .log-time { color: #333; min-width: 80px; }
    .log-msg { color: #888; }
    .log-msg.sync { color: #50a9ff; font-weight: bold; }
    .log-msg.manual { color: var(--magos-green); }

    /* Buttons Fix */
    .nav-actions { display: flex; gap: 15px; align-items: center; }
    .btn-action { 
        background: #fff; color: #000; border: none; 
        padding: 10px 18px; border-radius: 8px; 
        font-size: 9px; font-weight: 900; 
        cursor: pointer; transition: 0.3s;
        display: flex; align-items: center; gap: 8px;
        text-transform: uppercase;
    }
    .btn-action:hover { background: var(--magos-green); transform: translateY(-2px); }
  </style>
</head>
<body>

<div id="securityOverlay">
    <div class="pin-box">
        <img src="magos/assets/img/magos-icon.svg" style="width: 40px; margin-bottom: 20px;">
        <div class="status-text">WAREHOUSE ACCESS RESTRICTED</div>
        <input type="password" id="pinEntry" class="pin-input" maxlength="4" placeholder="••••">
        <button class="btn-action hover-target" onclick="checkPin()" style="width: 100%; justify-content: center;">AUTHORIZE ACCESS</button>
        <p id="errorMsg" style="color: var(--danger); font-size: 9px; margin-top: 15px; display: none;">INVALID_AUTHORIZATION_CODE</p>
    </div>
</div>

<div id="cursor"></div>

<div class="container" id="mainDashboard">
    <div class="header">
        <div class="logo-area">
            <img src="magos/assets/img/logo-header.svg" alt="MAGOS" class="logo-main">
            <div style="border-left: 1px solid #222; padding-left: 20px; margin-left: 5px;">
                <div class="system-status"><div class="pulse-dot"></div> SYSTEM ONLINE</div>
                <h1 style="font-size: 14px; color: #666; margin-top: 5px; letter-spacing: 1px;">WAREHOUSE PRO V2</h1>
            </div>
        </div>
        <div class="nav-actions">
            <button class="btn-action hover-target" onclick="syncWithCMS()" style="background: var(--magos-green);">
                <i class="fa-solid fa-rotate"></i> SYNC CMS
            </button>
            <button class="btn-action hover-target" onclick="copyStockReport()">
                <i class="fa-solid fa-copy"></i> COPY REPORT
            </button>
            <button class="btn-action hover-target" onclick="resetStock()" style="background:#ff4444; color:#fff;">
                <i class="fa-solid fa-triangle-exclamation"></i> HARD RESET
            </button>
            <button class="btn-action hover-target" onclick="logout()" style="background:#333; color:#fff;">
                <i class="fa-solid fa-lock"></i> LOCK
            </button>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <p>Inventory Value</p>
            <h2 id="totalVal">Rp 0</h2>
        </div>
        <div class="stat-card">
            <p>Total Items</p>
            <h2 id="totalQty">0</h2>
        </div>
        <div class="stat-card">
            <p>SKU Active</p>
            <h2 id="totalSKU">0</h2>
        </div>
        <div class="stat-card">
            <p>Warehouse Status</p>
            <h2 id="syncStatus" style="font-size: 14px; color: var(--magos-green);">SECURED</h2>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Article Name</th>
                    <th>Category</th>
                    <th>Stock Allocation (S - XXL)</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="stockTableBody"></tbody>
        </table>
    </div>

    <div style="margin-bottom: 10px; display:flex; justify-content:space-between; align-items:center;">
        <h3 style="font-size: 10px; font-weight: 900; letter-spacing: 2px; color: #333;">[ SYSTEM_LOGS ]</h3>
        <button class="hover-target" onclick="clearLogs()" style="background:none; border:none; color:#222; font-size:9px; cursor:pointer; font-weight:900;">TERMINATE_LOGS</button>
    </div>
    <div class="log-container" id="logItems"></div>
</div>

<script src="magos/js/magos.js"></script>
<script>
    // --- SECURITY CONFIG ---
    const MASTER_PIN = "1996"; 

    function checkPin() {
        const input = document.getElementById('pinEntry').value;
        if(input === MASTER_PIN) {
            document.getElementById('securityOverlay').style.display = 'none';
            document.getElementById('mainDashboard').style.filter = 'none';
            document.getElementById('mainDashboard').style.pointerEvents = 'auto';
            sessionStorage.setItem('warehouse_auth', 'true');
            loadWarehouse();
        } else {
            document.getElementById('errorMsg').style.display = 'block';
            document.getElementById('pinEntry').value = '';
        }
    }

    function logout() {
        sessionStorage.removeItem('warehouse_auth');
        location.reload();
    }

    window.onload = () => {
        if(sessionStorage.getItem('warehouse_auth') === 'true') {
            document.getElementById('securityOverlay').style.display = 'none';
            document.getElementById('mainDashboard').style.filter = 'none';
            document.getElementById('mainDashboard').style.pointerEvents = 'auto';
            loadWarehouse();
        }
    };

    // --- WAREHOUSE LOGIC ---
    async function syncWithCMS() {
        try {
            document.getElementById('syncStatus').innerText = "SYNCING...";
            const response = await fetch('_data/magos_products.json');
            const cmsData = await response.json();
            localStorage.setItem('magos_products_data', JSON.stringify(cmsData.items));
            addLog("CMS_DATABASE_SYNC_SUCCESS", "sync");
            loadWarehouse();
            document.getElementById('syncStatus').innerText = "SECURED";
        } catch (error) {
            alert("Sync Failed: " + error.message);
        }
    }

    function loadWarehouse() {
        const productData = JSON.parse(localStorage.getItem('magos_products_data'));
        if(!productData) return syncWithCMS();

        const tbody = document.getElementById('stockTableBody');
        tbody.innerHTML = '';
        let totalItems = 0; let totalVal = 0;

        productData.forEach((p, index) => {
            let stockHTML = '';
            for (let size in p.stock) {
                const qty = p.stock[size];
                totalItems += qty;
                totalVal += (qty * p.price);
                const low = qty <= 2 ? 'low' : '';
                stockHTML += `<div class="stock-pill"><span class="sz">${size}</span><span class="qt ${low}">${qty}</span></div>`;
            }

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><strong>${p.name}</strong></td>
                <td><span style="color:#444">${p.category}</span></td>
                <td><div style="display:flex;">${stockHTML}</div></td>
                <td><button class="btn-action hover-target" onclick="manualEdit(${index})">MANAGE</button></td>
            `;
            tbody.appendChild(tr);
        });

        document.getElementById('totalSKU').innerText = productData.length;
        document.getElementById('totalQty').innerText = totalItems;
        document.getElementById('totalVal').innerText = "Rp " + totalVal.toLocaleString('id-ID');
        renderLogs();
    }

    function manualEdit(idx) {
        const data = JSON.parse(localStorage.getItem('magos_products_data'));
        const size = prompt("Enter Size (S/M/L/XL/XXL):").toUpperCase();
        if(!data[idx].stock[size] && data[idx].stock[size] !== 0) return alert("Invalid Size");
        
        const change = parseInt(prompt("Enter quantity change:"));
        if(!isNaN(change)) {
            data[idx].stock[size] = Math.max(0, data[idx].stock[size] + change);
            localStorage.setItem('magos_products_data', JSON.stringify(data));
            addLog(`MANUAL_UPDATE: ${data[idx].name} [${size}] (${change})`, 'manual');
            loadWarehouse();
        }
    }

    function addLog(msg, type) {
        let logs = JSON.parse(localStorage.getItem('magos_warehouse_logs') || "[]");
        logs.unshift({ time: new Date().toLocaleTimeString(), msg, type });
        localStorage.setItem('magos_warehouse_logs', JSON.stringify(logs.slice(0, 50)));
        renderLogs();
    }

    function renderLogs() {
        const logs = JSON.parse(localStorage.getItem('magos_warehouse_logs') || "[]");
        document.getElementById('logItems').innerHTML = logs.map(l => `
            <div class="log-item">
                <span class="log-time">[${l.time}]</span>
                <span class="log-msg ${l.type}">${l.msg}</span>
            </div>
        `).join('');
    }

    function clearLogs() {
        localStorage.setItem('magos_warehouse_logs', "[]");
        renderLogs();
    }

    function copyStockReport() {
        const data = JSON.parse(localStorage.getItem('magos_products_data'));
        let report = "MAGOS STOCK REPORT\n===================\n";
        data.forEach(p => {
            report += `${p.name} | S:${p.stock.S} M:${p.stock.M} L:${p.stock.L} XL:${p.stock.XL} XXL:${p.stock.XXL}\n`;
        });
        navigator.clipboard.writeText(report);
        alert("Report copied!");
    }

    function resetStock() {
        if(confirm("Force Re-sync with CMS?")) syncWithCMS();
    }
</script>

</body>
</html>
